server {
    listen 80;
    server_name 178.128.93.188;
    root /var/www/html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    index index.php index.html;

    charset utf-8;

    # RIN-Nairith Laravel application
    location /RIN-Nairith {
        alias /var/www/html/RIN-Nairith/public;
        try_files $uri $uri/ @rin_nairith;

        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
    }

    location @rin_nairith {
        rewrite /RIN-Nairith/(.*)$ /RIN-Nairith/index.php?/$1 last;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
