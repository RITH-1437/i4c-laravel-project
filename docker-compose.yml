version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-tp01
    restart: unless-stopped
    user: root
    ports:
      - "8090:8080"
      - "50001:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins-network

  laravel-agent:
    build:
      context: ./laravel-agent
      dockerfile: Dockerfile
    container_name: jenkins-laravel-agent
    restart: unless-stopped
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_SSH_PUBKEY=ssh-rsa  administrator@DESKTOP-2BIHUSN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace:/workspace:ro
    depends_on:
      - jenkins
    networks:
      - jenkins-network

volumes:
  jenkins_home:
    driver: local

networks:
  jenkins-network:
    driver: bridge
